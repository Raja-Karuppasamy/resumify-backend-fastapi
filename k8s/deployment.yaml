apiVersion: apps/v1
kind: Deployment
metadata:
  name: resumify
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resumify
  template:
    metadata:
      labels:
        app: resumify
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: resumify
        image: rajajeba/resumifyapi:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: resumify-secrets
              key: ANTHROPIC_API_KEY
        - name: SUPABASE_SERVICE_ROLE_KEY
          valueFrom:
            secretKeyRef:
              name: resumify-secrets
              key: SUPABASE_SERVICE_ROLE_KEY
        - name: NEXT_PUBLIC_SUPABASE_URL
          valueFrom:
            secretKeyRef:
              name: resumify-secrets
              key: NEXT_PUBLIC_SUPABASE_URL
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: resumify
  namespace: default
spec:
  selector:
    app: resumify
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
